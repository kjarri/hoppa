<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoppuleikur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        #debugToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4a4e69;
            color: #fff;
            border: none;
            padding: 8px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            z-index: 100;
        }
        #debugToggle:hover {
            background: #ff6b6b;
        }
        .level-buttons {
            margin-bottom: 15px;
        }
        .level-btn {
            background: #4a4e69;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            font-family: 'Courier New', monospace;
        }
        .level-btn:hover {
            background: #9a8c98;
        }
        .level-btn.active {
            background: #e63946;
        }
        canvas {
            border: 4px solid #4a4e69;
            border-radius: 4px;
            background: #87ceeb; /* A fallback solid color, removing gradient to prevent mix */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            height: auto;
        }
        @media (hover: none) and (pointer: coarse) {
            .touch-hint {
                display: block !important;
            }
            canvas {
                touch-action: manipulation;
            }
        }
        .controls {
            margin-top: 20px;
            color: #f2e9e4;
            font-size: 14px;
        }
        .controls span {
            background: #22223b;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        .touch-controls {
            display: none;
            margin-top: 20px;
            justify-content: space-between;
            padding: 0 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #f2e9e4;
            border-radius: 50%;
            color: #f2e9e4;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .touch-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }
        .touch-left, .touch-right {
            display: flex;
            gap: 15px;
        }
        @media (hover: none) and (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
            .controls p:first-child {
                display: none;
            }
            #debugToggle {
                display: none;
            }
            canvas {
                touch-action: manipulation;
            }
        }
        #eventLog {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: #22223b;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 4px;
            min-height: 100px;
        }
        #eventLog div {
            margin: 2px 0;
        }
        .character-select {
            margin-bottom: 15px;
        }
        .char-btn {
            background: #4a4e69;
            color: #fff;
            border: 2px solid transparent;
            padding: 8px 16px;
            margin: 0 5px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .char-btn:hover {
            background: #9a8c98;
        }
        .char-btn.active {
            border-color: #e63946;
            background: #22223b;
        }
    </style>
</head>
<body>
    <button id="debugToggle" onclick="toggleDebug()">Villuleit: SLÖKKT</button>
    <div class="game-container">
        <div class="level-buttons">
            <button class="level-btn active" id="level1" onclick="selectLevel(1); this.blur()">Borð 1</button>
            <button class="level-btn" id="level2" onclick="selectLevel(2); this.blur()">Borð 2</button>
            <button class="level-btn" id="level3" onclick="selectLevel(3); this.blur()">Borð 3</button>
            <button class="level-btn" id="level4" onclick="selectLevel(4); this.blur()">Borð 4</button>
            <button class="level-btn" id="level5" onclick="selectLevel(5); this.blur()">Borð 5</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="touch-controls">
            <div class="touch-left">
                <div class="touch-btn" id="btnLeft">←</div>
                <div class="touch-btn" id="btnRight">→</div>
            </div>
            <div class="touch-right">
                <div class="touch-btn" id="btnJump">↟</div>
                <div class="touch-btn" id="btnShoot">●</div>
            </div>
        </div>
        <div id="eventLog"></div>
        <div class="controls">
            <p>Stýringar: <span>A</span> <span>D</span> til að hreyfa &nbsp;|&nbsp; <span>W</span> eða <span>Space</span> til að hoppa &nbsp;|&nbsp; <span>Örvar</span> til að skjóta</p>
        </div>
    </div>
    <script src="sprite_data.js"></script>
    <script src="game.js"></script>
</body>
</html>
